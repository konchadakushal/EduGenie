{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="header">

        <h1>🎓 EduGenie</h1>

        <p>Your AI Powered Educational Assistant</p>

    </div>

    <div class="card">

        <label>Choose Task</label>

        <select id="task">

            <option value="qa">Question Answering</option>

            <option value="explain">Concept Explanation</option>

            <option value="quiz">Quiz Generation</option>

            <option value="summarize">Text Summarization</option>

            <option value="learn">Learning Recommendation</option>

        </select>

        <label>Enter your Question / Topic</label>

        <textarea
            id="query"
            rows="7"
            placeholder="Ask anything about Programming, AI, DSA, DBMS..."></textarea>

        <button onclick="submitTask()">

            🚀 Generate

        </button>

    </div>

    <div id="loading"></div>

    <div id="result" class="result-box">

        Your AI response will appear here...

    </div>

</div>

<script src="{{ url_for('static', path='js/script.js') }}"></script>

{% endblock %}
